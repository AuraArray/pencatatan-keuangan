<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan Keuangan - My Money</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h2>My Money Tracker</h2>
            <p>Kelola pemasukan & pengeluaran harian</p>
        </header>
        
        <div class="form-section">
            <div class="form-group">
                <label>Keterangan</label>
                <input type="text" id="keterangan" placeholder="Contoh: Beli Seblak Madit" required>
            </div>

            <div class="form-group">
                <label>Nominal (Rp)</label>
                <input type="number" id="nominal" placeholder="0" required>
            </div>

            <div class="form-group">
                <label>Jenis Transaksi</label>
                <select id="jenis">
                    <option value="pemasukan">Pemasukan (+)</option>
                    <option value="pengeluaran" selected>Pengeluaran (-)</option>
                </select>
            </div>

            <button type="button" class="btn-add" id="btnTambah" onclick="tambahTransaksi()">
                Tambah Transaksi
            </button>
        </div>

        <div class="summary">
            <span class="label">Total Saldo:</span>
            <span id="total-saldo">Rp 0</span>
        </div>

        <div class="history-container">
            <table id="tabel-riwayat">
                <thead>
                    <tr>
                        <th>Keterangan</th>
                        <th style="text-align: right;">Nominal</th>
                    </tr>
                </thead>
                <tbody id="isi-tabel">
                    </tbody>
            </table>
        </div>

        <button type="button" class="btn-delete" onclick="hapusSemua()">
            Hapus Semua Riwayat
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
