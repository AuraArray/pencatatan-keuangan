<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan Keuangan - My Money</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Catatan Keuangan</h2>
        
        <div class="form-section">
            <div class="form-group">
                <label for="keterangan">Keterangan</label>
                <input type="text" id="keterangan" placeholder="Misal: Beli Seblak Madit" required>
            </div>

            <div class="form-group">
                <label for="nominal">Nominal (Rp)</label>
                <input type="number" id="nominal" placeholder="0" required>
            </div>

            <div class="form-group">
                <label for="jenis">Jenis Transaksi</label>
                <select id="jenis">
                    <option value="pemasukan">Pemasukan (+)</option>
                    <option value="pengeluaran">Pengeluaran (-)</option>
                </select>
            </div>

            <button class="btn-add" onclick="tambahTransaksi()">Tambah Transaksi</button>
        </div>

        <div class="summary">
            <span>Total Saldo Saat Ini:</span>
            <span id="total-saldo">Rp 0</span>
        </div>

        <div class="history-container">
            <table>
                <thead>
                    <tr>
                        <th>Keterangan</th>
                        <th>Nominal</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>

        <button class="btn-delete" onclick="hapusSemua()">Hapus Semua Riwayat</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
