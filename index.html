<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Money Tracker - Final Version</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h2>My Money Tracker</h2>
            <p>Sistem Pencatatan Keuangan Personal</p>
        </header>
        
        <div class="form-section">
            <div class="form-group">
                <label for="keterangan">Keterangan</label>
                <input type="text" id="keterangan" placeholder="Misal: Jual Seblak Madit" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="nominal">Nominal (Rp)</label>
                <input type="number" id="nominal" placeholder="0">
            </div>

            <div class="form-group">
                <label for="jenis">Jenis Transaksi</label>
                <select id="jenis">
                    <option value="pemasukan">Pemasukan (+)</option>
                    <option value="pengeluaran" selected>Pengeluaran (-)</option>
                </select>
            </div>

            <button type="button" class="btn-add" onclick="tambahTransaksi()">
                Tambah Transaksi
            </button>
        </div>

        <div class="summary">
            <span class="label">Total Saldo:</span>
            <span id="total-saldo">Rp 0</span>
        </div>

        <div class="action-buttons">
            <button type="button" class="btn-print" onclick="cetakLaporan()">
                Cetak Laporan (PDF)
            </button>
        </div>

        <div class="history-container">
            <h3 class="history-title">Riwayat Transaksi</h3>
            <table id="tabel-riwayat">
                <thead>
                    <tr>
                        <th>Keterangan</th>
                        <th style="text-align: right;">Nominal</th>
                    </tr>
                </thead>
                <tbody id="isi-tabel">
                    </tbody>
            </table>
        </div>

        <div class="footer-actions">
            <button type="button" class="btn-delete" onclick="hapusSemua()">
                Hapus Semua Riwayat
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
